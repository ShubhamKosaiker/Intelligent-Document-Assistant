name: Deploy Application Docker Image to EC2

# Trigger: runs automatically on every push to main branch
on:
  push:
    branches:
      - main

jobs:

  # ─── JOB 1: BUILD & PUSH IMAGE TO ECR ───────────────────────────────────────
  # Runs on GitHub's cloud server (fresh Ubuntu VM every time)
  Continuous-Integration:
    runs-on: ubuntu-latest

    steps:

      # Pull your latest code from GitHub into the runner
      - name: Checkout
        uses: actions/checkout@v4

      # Authenticate the runner with AWS using your IAM credentials
      # Values come from GitHub Secrets — never hardcoded
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      # Login Docker to your private ECR registry
      # Gives us the ECR URL via steps.login-ecr.outputs.registry
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Build the Docker image from ./app/Dockerfile
      # Tag it with your ECR repo URI and push it
      # ECR_REGISTRY = your AWS account ECR URL
      # ECR_REPOSITORY = repo name from GitHub Secrets
      # IMAGE_TAG = 'latest' (overwrites previous image on every push)
      - name: Build, tag and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPO }}
          IMAGE_TAG: latest
        run: |
          # Build image from your app's Dockerfile
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./app

          # Push the built image to ECR
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          # Save full image URI as output for reference
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  # ─── JOB 2: DEPLOY ON EC2 ────────────────────────────────────────────────────
  # Runs ONLY after CI passes (needs: Continuous-Integration)
  # self-hosted = runs directly ON your EC2 instance
  # EC2 must have GitHub Actions runner installed first
  Continuous-Deployment:
    needs: Continuous-Integration  # Don't deploy if build failed
    runs-on: self-hosted           # Executes on your EC2 machine directly

    steps:

      # Pull latest code onto EC2 as well
      - name: Checkout
        uses: actions/checkout@v4

      # Authenticate EC2 with AWS so it can pull from ECR
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      # Login Docker on EC2 to ECR
      # EC2 needs this to pull the image we just pushed
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Stop old container, remove it, run the new image
      # || true = don't fail if no container exists yet (first deploy)
      # -d = run in background (detached)
      # -p 80:5000 = map public port 80 to container port 5000
      # --env-file = load API keys from .env file on EC2
      - name: Run Docker image to serve users
        run: |
          # Stop current container (ignore error if not running)
          docker stop text-assistant || true

          # Remove old container to recreate it fresh
          docker rm text-assistant || true

          # Pull latest image from ECR and run it
          docker run -d \
            --name text-assistant \
            -p 80:5000 \
            --env-file /home/ubuntu/.env \
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPO }}:latest